# Template Ingress — SSL géré par Cloudflare, HTTP côté cluster
# Remplace : app.mondomaine.com, MON_NAMESPACE, MON_SERVICE, PORT
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mon-app
  namespace: MON_NAMESPACE
spec:
  ingressClassName: nginx
  rules:
    - host: app.mondomaine.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: MON_SERVICE
                port:
                  number: PORT
